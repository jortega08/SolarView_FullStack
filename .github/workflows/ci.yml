##############################################################################
# Soleim CI — GitHub Actions
#
# Jobs:
#   lint    — ruff + black check (fast, no services)
#   test    — pytest with Postgres + Redis service containers
#   migrate — checks migrations are consistent (no missing/unapplied)
#
# Triggered on: push to main/develop, PRs to main
##############################################################################

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:

  # --------------------------------------------------------------------------
  # Linting — no services needed, runs fast
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soleimapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soleimapp/requirements.txt

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff check
        run: ruff check . --select E,F,W,I --ignore E501

      - name: black check
        run: black --check --diff .

  # --------------------------------------------------------------------------
  # Tests — needs Postgres + Redis
  # --------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soleimapp

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soleim_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-insecure-secret-key-not-for-production
      DEBUG: 'True'
      POSTGRES_DB: soleim_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      IOT_SHARED_SECRET: ''
      IOT_BUFFER_ENABLED: 'False'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soleimapp/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./soleimapp/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Migration consistency check
  # --------------------------------------------------------------------------
  migrations:
    name: Migration check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soleimapp

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soleim_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-insecure-check
      DEBUG: 'True'
      POSTGRES_DB: soleim_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: soleimapp/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        run: python manage.py migrate --check --noinput

      - name: Detect unapplied changes
        run: python manage.py makemigrations --check --dry-run --noinput
