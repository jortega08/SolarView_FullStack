[pytest]
DJANGO_SETTINGS_MODULE = soleimapp.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --strict-markers
    -q
    --cov=.
    --cov-report=term-missing
    --cov-fail-under=60
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring DB + Redis
