services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-soleim}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0}
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./soleimapp:/app
    command: >
      sh -c "until python manage.py migrate --noinput; do echo '[Django] Esperando BD...'; sleep 3; done &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 soleimapp.asgi:application"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0}
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./soleimapp:/app
    command: celery -A soleimapp worker -l info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0}
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./soleimapp:/app
    command: celery -A soleimapp beat -l info --schedule /tmp/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  react:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5174:5174"
    volumes:
      - ./soleim-front:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  mosquitto:
    build:
      context: ./iot/mosquitto
      dockerfile: Dockerfile
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    environment:
      - TZ=America/Bogota
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USER:-soleim} -P ${MQTT_PASS:-soleim_mqtt_2024} -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  mqtt-publisher:
    build:
      context: ./iot/publisher
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soleim}
      - MQTT_PASS=${MQTT_PASS:-soleim_mqtt_2024}
      - INSTALACION_ID=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./iot/publisher:/app
    command: python -u app.py

  mqtt-consumer:
    build:
      context: ./iot/consumer
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      django:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER:-soleim}
      - MQTT_PASS=${MQTT_PASS:-soleim_mqtt_2024}
      - DJANGO_API=http://django:8000
    volumes:
      - ./iot/consumer:/app
    command: python consumer.py

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  mosquitto_config:
