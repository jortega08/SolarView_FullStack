##############################################################################
# Soleim — Docker Compose
# P2: Added Nginx reverse proxy, pgBouncer connection pooler,
#     Prometheus metrics collection, and Grafana dashboards.
#
# Ports exposed to host:
#   80    → Nginx (HTTP API + static + WebSocket)
#   5174  → React frontend (dev)
#   9090  → Prometheus UI
#   3000  → Grafana UI
#   5432  → Postgres (dev access)
#   6379  → Redis (dev access)
##############################################################################

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soleim}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # pgBouncer — connection pooler between app and Postgres.
  # Session pooling mode preserves compatibility with CONN_MAX_AGE.
  # pgBouncer — usa edoburu/pgbouncer, imagen mantenida y disponible en Docker Hub.
  # Escucha en el puerto 5432 del contenedor (por defecto).
  # El host externo puede acceder en localhost:6432 para debugging.
  # Django/Celery se conectan a pgbouncer:5432 (red interna Docker).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      DB_NAME: ${POSTGRES_DB:-soleim}
      POOL_MODE: session
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: plain
    ports:
      - "6432:5432"    # host:6432 → contenedor:5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # nc (netcat) está disponible en Alpine — verifica que el puerto esté abierto
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------

  django:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    # Port NOT exposed to host — all traffic goes through Nginx.
    # Keep 8000 open between containers.
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0},nginx
      # Conectar a pgBouncer (red interna Docker: puerto 5432 del contenedor)
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      IOT_SHARED_SECRET: ${IOT_SHARED_SECRET:-}
      IOT_BUFFER_ENABLED: ${IOT_BUFFER_ENABLED:-True}
      CONN_MAX_AGE: ${CONN_MAX_AGE:-0}
    volumes:
      # El código sigue como bind mount para desarrollo.
      # staticfiles vive en un volumen Docker para evitar permisos raros de
      # OneDrive/Windows cuando collectstatic intenta limpiar archivos previos.
      # media usa el mismo enfoque para permitir uploads desde Django.
      - ./soleimapp:/app
      - staticfiles_data:/app/staticfiles
      - media_data:/app/media
    command: >
      sh -c "until python manage.py migrate --noinput; do echo '[Django] Esperando BD...'; sleep 3; done &&
            python manage.py collectstatic --noinput --clear &&
            daphne -b 0.0.0.0 -p 8000 soleimapp.asgi:application"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # Nginx — reverse proxy, rate limiting, static files, SSL termination point.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  celery-worker:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      IOT_SHARED_SECRET: ${IOT_SHARED_SECRET:-}
      CONN_MAX_AGE: ${CONN_MAX_AGE:-0}
    volumes:
      - ./soleimapp:/app
    command: celery -A soleimapp worker -l info --concurrency=4 -Q celery,notifications
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  celery-beat:
    build:
      context: ./soleimapp
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-django,localhost,127.0.0.1,0.0.0.0}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CONN_MAX_AGE: ${CONN_MAX_AGE:-0}
    volumes:
      - ./soleimapp:/app
    command: celery -A soleimapp beat -l info --schedule /tmp/celerybeat-schedule
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  react:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost}
    volumes:
      - ./soleim-front:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # ---------------------------------------------------------------------------
  # IoT simulation
  # ---------------------------------------------------------------------------

  mosquitto:
    build:
      context: ./iot/mosquitto
      dockerfile: Dockerfile
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    environment:
      TZ: America/Bogota
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USER:-soleim} -P ${MQTT_PASS:-soleim_mqtt_2024} -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  mqtt-publisher:
    build:
      context: ./iot/publisher
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-soleim}
      MQTT_PASS: ${MQTT_PASS:-soleim_mqtt_2024}
      # Por defecto publica para las 10 instalaciones demo creadas por seed_demo_data.
      # Override: MQTT_INSTALACION_IDS=1,3,5 o MQTT_INSTALACION_IDS=1-10
      INSTALACION_IDS: ${MQTT_INSTALACION_IDS:-1-10}
      PUBLISH_INTERVAL_SECONDS: ${MQTT_PUBLISH_INTERVAL_SECONDS:-10}
      SAMPLE_MINUTES: ${MQTT_SAMPLE_MINUTES:-15}
      ALERT_PROBABILITY: ${MQTT_ALERT_PROBABILITY:-0.01}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./iot/publisher:/app
    command: python -u app.py

  mqtt-consumer:
    build:
      context: ./iot/consumer
      dockerfile: Dockerfile
    depends_on:
      mosquitto:
        condition: service_healthy
      django:
        condition: service_healthy
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER:-soleim}
      MQTT_PASS: ${MQTT_PASS:-soleim_mqtt_2024}
      # Internal M2M traffic goes directly to Django; Nginx remains for user traffic.
      DJANGO_API: http://django:8000
      IOT_SHARED_SECRET: ${IOT_SHARED_SECRET:-}
      DJANGO_REQUEST_TIMEOUT_SECONDS: ${DJANGO_REQUEST_TIMEOUT_SECONDS:-10}

    volumes:
      - ./iot/consumer:/app
    command: python consumer.py

  # ---------------------------------------------------------------------------
  # Observability (P2)
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  mosquitto_config:
  staticfiles_data:
  media_data:
  prometheus_data:
  grafana_data:
